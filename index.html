<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Loading…</title>

  <!-- Netflix-ish bold display font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============================================================= -->
  <!-- SCREEN 1 — INTRO SPLASH                                       -->
  <!-- ============================================================= -->
  <section id="screen-intro" class="screen is-active">
    <div class="intro-stage" id="introStage">
      <!-- Ribbon-like light beams burst out of the "A" (generated by JS) -->
      <div class="beams" id="beams"></div>
      <!-- Single letter that opens the sequence -->
      <div class="intro-letter" id="introLetter"></div>
      <!-- Full wordmark that resolves after the beams -->
      <div class="intro-word" id="introWord"></div>
    </div>
    <!-- Optional "tudum" splash sound. Autoplay-safe: JS attempts play, ignores failure. -->
    <audio id="introSound" src="assets/intro-sound.mp3" preload="auto"></audio>
  </section>

  <!-- ============================================================= -->
  <!-- SCREEN 2 — PROFILE SELECTION ("Who's watching?")             -->
  <!-- ============================================================= -->
  <section id="screen-profiles" class="screen">
    <!-- Brand mark, top-left, like Netflix's logo on the profiles page -->
    <div class="profiles-logo" id="profilesLogo"></div>
    <div class="profiles-wrap">
      <h2 class="profiles-title">Who's watching?</h2>
      <ul class="profiles-grid" id="profilesGrid"><!-- profiles injected by JS --></ul>
    </div>
    <!-- Easter-egg toast for the joke profiles -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </section>

  <!-- ============================================================= -->
  <!-- SCREEN 3 — BROWSE / HOME                                      -->
  <!-- ============================================================= -->
  <section id="screen-browse" class="screen">
    <!-- Top nav bar (fades solid on scroll) -->
    <header class="nav" id="nav">
      <div class="nav-left">
        <div class="nav-logo" id="navLogo"><!-- brand injected by JS --></div>
        <nav class="nav-links">
          <span class="nav-link is-active">Home</span>
          <span class="nav-link">Shows</span>
          <span class="nav-link">Movies</span>
          <span class="nav-link">New &amp; Popular</span>
          <span class="nav-link">My List</span>
          <span class="nav-link">Browse by Languages</span>
        </nav>
      </div>
      <div class="nav-right">
        <button class="nav-icon" aria-label="Search">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M10 4a6 6 0 104.47 10l4.76 4.77 1.42-1.42-4.77-4.76A6 6 0 0010 4zm0 2a4 4 0 110 8 4 4 0 010-8z"/></svg>
        </button>
        <button class="nav-icon" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M12 22a2 2 0 002-2h-4a2 2 0 002 2zm6-6v-5a6 6 0 10-12 0v5l-2 2v1h16v-1z"/></svg>
        </button>
        <div class="nav-profile">
          <span class="nav-avatar" id="navAvatar"></span>
          <svg class="nav-caret" viewBox="0 0 24 24" width="12" height="12" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </header>

    <!-- Hero banner -->
    <div class="hero" id="hero">
      <div class="hero-fade"></div>
      <div class="hero-content">
        <h1 class="hero-title" id="heroTitle"></h1>
        <p class="hero-blurb" id="heroBlurb"></p>
        <div class="hero-buttons">
          <button class="btn btn-play" id="heroPlay">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            Play
          </button>
          <button class="btn btn-info" id="heroInfo">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16z"/></svg>
            More Info
          </button>
        </div>
      </div>
    </div>

    <!-- Rows of title cards (injected by JS) -->
    <main class="rows" id="rows"></main>
  </section>

  <!-- ============================================================= -->
  <!-- SCREEN 4 — FULL-SCREEN PLAYER                                 -->
  <!-- ============================================================= -->
  <div id="player" class="player" aria-hidden="true">
    <video id="playerVideo" class="player-video" playsinline></video>

    <!-- Loading shimmer while the master video buffers -->
    <div class="player-spinner" id="playerSpinner"></div>

    <!-- Close / back -->
    <button class="player-close" id="playerClose" aria-label="Close player">
      <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true"><path fill="currentColor" d="M14 5l-1.4 1.4L18.2 12l-5.6 5.6L14 19l7-7zM4 11h13v2H4z"/></svg>
    </button>

    <!-- Title overlay (top-left, fades with controls) -->
    <div class="player-heading" id="playerHeading"></div>

    <!-- Custom controls -->
    <div class="player-controls" id="playerControls">
      <div class="scrubber" id="scrubber">
        <div class="scrubber-buffered" id="scrubBuffered"></div>
        <div class="scrubber-filled" id="scrubFilled"></div>
        <div class="scrubber-knob" id="scrubKnob"></div>
      </div>

      <div class="controls-row">
        <div class="controls-left">
          <button class="ctrl-btn" id="btnPlayPause" aria-label="Play/Pause">
            <svg class="icon-play" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true" hidden><path fill="currentColor" d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
          </button>

          <div class="volume">
            <button class="ctrl-btn" id="btnMute" aria-label="Mute">
              <svg class="icon-vol" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
              <svg class="icon-muted" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true" hidden><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9zm18 .4L19.6 8 17 10.6 14.4 8 13 9.4 15.6 12 13 14.6 14.4 16 17 13.4 19.6 16 21 14.6 18.4 12z"/></svg>
            </button>
            <input class="volume-slider" id="volumeSlider" type="range" min="0" max="1" step="0.05" value="1" aria-label="Volume" />
          </div>

          <span class="time" id="timeLabel">0:00 / 0:00</span>
        </div>

        <div class="controls-right">
          <span class="player-name" id="playerNameSmall"></span>
          <button class="ctrl-btn" id="btnFullscreen" aria-label="Fullscreen">
            <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="currentColor" d="M7 14H5v5h5v-2H7zm-2-4h2V7h3V5H5zm12 7h-3v2h5v-5h-2zM14 5v2h3v3h2V5z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Data config (edit this file to add your photos/videos) -->
  <script src="js/config.js"></script>
  <!-- App logic -->
  <script src="js/app.js"></script>
</body>
</html>
